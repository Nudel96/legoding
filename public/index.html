<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEGO Deal Finder Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="header-content">
        <h1>🧱 Deal Finder <span class="badge">Live</span></h1>
        <div class="header-actions">
          <button id="run-pipeline-btn" class="btn primary">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v6h6"></path></svg>
            Suche ausführen
          </button>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Aktive Jobs</span>
          <span class="stat-value" id="stat-jobs">-</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Gefundene Listings</span>
          <span class="stat-value" id="stat-listings">-</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Top Deals (>60)</span>
          <span class="stat-value highlight" id="stat-top">-</span>
        </div>
      </div>
    </header>

    <main>
      <div class="filters">
        <label>Mindest-Score:</label>
        <input type="range" id="score-filter" min="0" max="100" value="40" step="5">
        <span id="score-value">40+</span>
      </div>

      <div id="deals-grid" class="deals-grid">
        <!-- Deals will be injected here via JS -->
        <div class="loading-state">Lade Deals...</div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
